<svg width="500" height="500" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>XPand logo</title>
  <desc>XPand icon — expanding chevron tiers with gold apex, no background</desc>

  <defs>
    <linearGradient id="topChev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B1FBF"/>
      <stop offset="100%" stop-color="#6B4FE8"/>
    </linearGradient>
    <linearGradient id="midChev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B42B4"/>
      <stop offset="100%" stop-color="#8B6EE8"/>
    </linearGradient>
    <linearGradient id="botChev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B60D4"/>
      <stop offset="100%" stop-color="#A890F0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5B731"/>
      <stop offset="100%" stop-color="#D4940A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tier 1 — bottom, narrowest -->
  <polyline points="185,385 250,325 315,385"
    fill="none" stroke="#C8C0F8" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <polyline points="185,385 250,325 315,385"
    fill="none" stroke="url(#botChev)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tier 2 — mid -->
  <polyline points="155,305 250,225 345,305"
    fill="none" stroke="#B8AEFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <polyline points="155,305 250,225 345,305"
    fill="none" stroke="url(#midChev)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tier 3 — top, widest, brightest -->
  <polyline points="118,222 250,130 382,222"
    fill="none" stroke="#A090FF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" filter="url(#softGlow)"/>
  <polyline points="118,222 250,130 382,222"
    fill="none" stroke="url(#topChev)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cyan accent dots at top chevron tips -->
  <circle cx="118" cy="222" r="6" fill="#22D3EE" opacity="0.9"/>
  <circle cx="382" cy="222" r="6" fill="#22D3EE" opacity="0.9"/>
  <!-- subtle cyan glow behind dots -->
  <circle cx="118" cy="222" r="11" fill="#22D3EE" opacity="0.15"/>
  <circle cx="382" cy="222" r="11" fill="#22D3EE" opacity="0.15"/>

  <!-- Gold apex dot -->
  <circle cx="250" cy="130" r="18" fill="#F5B731" opacity="0.18" filter="url(#goldGlow)"/>
  <circle cx="250" cy="130" r="13" fill="url(#goldGrad)"/>
  <!-- inner shine -->
  <circle cx="245" cy="125" r="4" fill="#FEF3C7" opacity="0.75"/>

</svg>
